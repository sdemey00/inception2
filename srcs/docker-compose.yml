# version: '3.8'

services:

# -- MariaDB --
  mariadb:
    build: ./requirements/mariadb
    image: mariadb                  # image name = service name (required)
    container_name: mariadb
    restart: unless-stopped         # auto-restart on crash
    env_file: .env
    secrets:
      - db_password
      - db_root_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception_net
    expose:
      - "3306"                      # internal only, not published to host

# -- WordPress --
  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: unless-stopped
    env_file: .env
    secrets:
      - db_password
      - credentials
    environment:
      MYSQL_HOST: mariadb           # use service name for DNS resolution
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_net
    expose:
      - "9000"
    depends_on:
      - mariadb

# -- NGINX --
  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    restart: unless-stopped
    env_file: .env
    volumes:
      - wordpress_data:/var/www/html # shares WP files with WordPress
    ports:
      - "443:443"                    # only exposed port to the host
    networks:
      - inception_net
    depends_on:
      - wordpress

# -- Secrets --
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt

# -- Networks --
networks:
  inception_net:
    driver: bridge

# -- Volumes --
volumes:
  db_data:
    driver: local
    # driver_opts:                        # since bind mounts are forbidden this is removed
    #   type: none
    #   o: bind
    #   device: /home/sdemey/data/db
  wordpress_data:
    driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /home/sdemey/data/wordpress
