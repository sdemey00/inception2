[www]
user = www-data
group = www-data

; Listen on TCP port 9000 (NGINX connects here via Docker network)
listen = 0.0.0.0:9000

listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Environment variables passed to PHP
clear_env = no