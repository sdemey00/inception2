server {
	listen 443 ssl;
	listen [::]:443 ssl;
	server_name sdemey.42.fr;

	# TLS configuration — only TLSv1.2 and TLSv1.3
	ssl_certificate /etc/ssl/certs/nginx.crt;
	ssl_certificate_key /etc/ssl/private/nginx.key;
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers HIGH:!aNULL:!MD5;
	
	# WordPress root
	root /var/www/html;
	index index.php index.html;
	
	# Serve requests — try file, then directory, then PHP fallback
	location / {
		try_files $uri $uri/ /index.php?$args;
	}
	
	# Pass PHP scripts to WordPress container via FastCGI
	location ~ \.php$ {
		include fastcgi_params;
		fastcgi_pass wordpress:9000;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_param PHP_VALUE "upload_max_filesize = 10M;";
	}
	
	# Deny access to hidden files
	location ~ /\. {
		deny all;
	}
}

# No HTTP server block - port 80 is not exposed